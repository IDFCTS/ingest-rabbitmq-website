server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # Keep redirects relative so external mapped ports (for example 8081) are preserved.
    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Handle extensionless deep links for all sections, not just /docs.
    location / {
        try_files $uri $uri.html $uri/ @strip_trailing_slash;
        expires 30m;
        add_header Cache-Control "public, no-transform";
    }

    location @strip_trailing_slash {
        rewrite ^/(.*)/$ /$1.html last;
        return 404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}